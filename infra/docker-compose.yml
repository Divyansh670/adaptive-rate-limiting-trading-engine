

services:

  # ---------- REDIS ----------
  redis:
    image: redis:7.2-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- POSTGRES ----------
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_DB: trading_engine
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: trading_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user -d trading_engine"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- REDPANDA (Kafka-compatible) ----------
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: trading-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "9092:9092"   # Kafka API port (our Spring Boot app connects here)
      - "8082:8082"   # HTTP proxy (optional, useful for debugging)

  # ---------- REDPANDA CONSOLE (optional UI to inspect Kafka topics) ----------
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.5.2
    container_name: trading-redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

volumes:
  postgres_data: