spring:
  application:
    name: trading-engine

  datasource:
    url: jdbc:postgresql://localhost:55432/trading_engine
    username: trading_user
    password: trading_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # we let Flyway manage schema, not Hibernate auto-generation
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8081   # 8080 is taken by Redpanda Console, so our app uses 8081